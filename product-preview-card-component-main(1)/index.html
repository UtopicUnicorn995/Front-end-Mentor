<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./images/favicon-32x32.png"
    />
    <link rel="stylesheet" href="./style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,700&family=Montserrat:wght@500;700&display=swap"
      rel="stylesheet"
    />

    <title>Frontend Mentor | Product preview card component</title>
  </head>
  <body>
    <main class="main">
      <div class="block__container block__container--image">
        <img
          class="block__image--desktop"
          src="./images/image-product-desktop.jpg"
          alt="Perfume Image"
        />
        <img
          class="block__image--mobile"
          src="./images/image-product-mobile.jpg"
          alt="Perfume Image"
        />
      </div>
      <div class="block__container block__container--text">
        <p class="p__text--top">Perfume</p>
        <h1>Gabrielle Essence Eau De Parfum</h1>
        <p class="p__text--bottom">
          A floral, solar and voluptuous interpretation composed by Olivier
          Polge, Perfumer-Creator for the House of CHANEL.
        </p>
        <div class="text__container--price">
          <p class="text--large">$149.99</p>
          <p class="text--small">$169.99</p>
        </div>
        <button class="button--addCart">
          <img src="./images/icon-cart.svg" alt="" />Add to Cart
        </button>
      </div>
    </main>

    <div class="attribution">
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge" target="_blank"
        >Frontend Mentor</a
      >. Coded by <a href="#">Your Name Here</a>.
    </div>
  </body>
</html>
